<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="청담대교">
<meta name="theme-color" content="#00E5CC">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>청담대교 Digital Twin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap');
  :root {
    --bg:      #080C14;
    --panel:   #0D1420;
    --border:  #1A2640;
    --accent:  #00E5CC;
    --warn:    #F0A030;
    --danger:  #E84040;
    --safe:    #30C080;
    --text:    #C8D8E8;
    --textMut: #5A7A99;
    --mono:    'IBM Plex Mono', monospace;
    --sans:    'Noto Sans KR', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* 헤더 */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    height: 44px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-shrink: 0;
    z-index: 10;
  }
  .header-left { display:flex; align-items:center; gap:10px; }
  .logo-dot {
    width:7px; height:7px; border-radius:50%;
    background:var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  .logo-text { font-family:var(--mono); font-size:10px; color:var(--accent); letter-spacing:.1em; }
  .header-right { display:flex; align-items:center; gap:10px; }
  .status-badge {
    display:flex; align-items:center; gap:5px;
    padding:3px 8px; border-radius:20px;
    border:1px solid var(--safe);
    font-family:var(--mono); font-size:9px; color:var(--safe);
  }
  .status-dot { width:4px; height:4px; border-radius:50%; background:var(--safe); animation:pulse 1.5s ease-in-out infinite; }
  .time-display { font-family:var(--mono); font-size:10px; color:var(--textMut); }

  /* 메인 레이아웃 */
  .main { display:flex; flex-direction:column; flex:1; overflow:hidden; }

  /* 3D 뷰어 */
  #canvas-wrap { position:relative; overflow:hidden; flex-shrink:0; }
  canvas { display:block; }

  /* 로딩 */
  #loading-overlay {
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%);
    background:rgba(13,20,32,.95);
    border:1px solid var(--border);
    border-radius:8px;
    padding:20px 30px;
    font-family:var(--mono); font-size:11px;
    color:var(--accent); letter-spacing:.08em;
    z-index:10; text-align:center;
  }
  .load-bar-wrap { width:180px; height:3px; background:var(--border); border-radius:2px; margin-top:10px; overflow:hidden; }
  #loading-bar { height:100%; width:0%; background:var(--accent); border-radius:2px; transition:width .3s; }
  #load-progress { color:var(--textMut); font-size:10px; margin-top:5px; }

  /* 범례 */
  .legend {
    position:absolute; bottom:10px; right:10px;
    background:rgba(13,20,32,.85);
    border:1px solid var(--border);
    border-radius:6px; padding:8px 12px;
    font-family:var(--mono); font-size:9px;
  }
  .legend-title { color:var(--textMut); margin-bottom:6px; }
  .legend-item { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
  .legend-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

  /* 센서 패널 */
  .side-panel {
    background:var(--panel);
    border-top:1px solid var(--border);
    display:flex; flex-direction:column;
    overflow:hidden; flex-shrink:0;
  }
  .panel-tabs { display:flex; border-bottom:1px solid var(--border); flex-shrink:0; }
  .tab {
    flex:1; padding:10px 0; text-align:center;
    font-family:var(--mono); font-size:10px; letter-spacing:.08em;
    color:var(--textMut); cursor:pointer;
    border-bottom:2px solid transparent;
  }
  .tab.active { color:var(--accent); border-bottom-color:var(--accent); }
  .panel-content { flex:1; overflow-y:auto; padding:8px; }
  .panel-content::-webkit-scrollbar { width:3px; }
  .panel-content::-webkit-scrollbar-thumb { background:var(--border); }

  /* 센서 카드 */
  .sensor-section-title {
    font-family:var(--mono); font-size:9px; letter-spacing:.12em;
    color:var(--textMut); margin:8px 0 5px;
    text-transform:uppercase;
  }
  .sensor-card {
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:6px;
    padding:8px 8px 8px 11px;
    margin-bottom:6px;
    cursor:pointer;
    position:relative; overflow:hidden;
  }
  .sensor-card::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
    background:var(--card-color, var(--accent));
  }
  .sensor-card.selected { border-color:var(--card-color, var(--accent)); background:#0A1018; }
  .sc-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:3px; }
  .sc-id { font-family:var(--mono); font-size:9px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:160px; }
  .sc-status { font-family:var(--mono); font-size:8px; padding:1px 5px; border-radius:10px; border:1px solid currentColor; flex-shrink:0; }
  .sc-status.safe { color:var(--safe); }
  .sc-status.warn { color:var(--warn); }
  .sc-status.danger { color:var(--danger); }
  .sc-val { font-family:var(--mono); font-size:16px; color:#fff; font-weight:500; }
  .sc-unit { font-family:var(--mono); font-size:9px; color:var(--textMut); margin-left:3px; }
  .sc-type { font-size:9px; color:var(--textMut); margin-top:1px; }

  /* 바텀 시트 팝업 */
  #graph-popup {
    position:fixed; bottom:0; left:0; right:0;
    background:var(--panel);
    border-radius:16px 16px 0 0;
    border-top:1px solid var(--border);
    padding:0 16px 24px;
    z-index:20; display:none;
    transform:translateY(100%);
    transition:transform .3s ease;
    max-height:70vh; overflow-y:auto;
  }
  #graph-popup.show { display:block; transform:translateY(0); }
  .popup-handle { width:36px; height:3px; background:var(--border); border-radius:2px; margin:12px auto 14px; }
  .popup-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .popup-title { font-family:var(--mono); font-size:12px; color:var(--accent); }
  .popup-close { background:none; border:1px solid var(--border); color:var(--textMut); cursor:pointer; width:24px; height:24px; border-radius:4px; font-size:14px; display:flex; align-items:center; justify-content:center; }
  .period-btn { flex:1; padding:5px 0; background:var(--border); border:none; color:var(--textMut); font-family:var(--mono); font-size:10px; cursor:pointer; border-radius:3px; }
  .period-btn.active { background:var(--accent); color:#000; font-weight:500; }
  #graph-canvas { width:100%; height:150px; }
  .popup-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:12px; }
  .stat-box { background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:8px 10px; }
  .stat-label { font-family:var(--mono); font-size:9px; color:var(--textMut); margin-bottom:4px; }
  .stat-val { font-family:var(--mono); font-size:13px; color:#fff; font-weight:500; }

  /* footer */
  footer {
    height:28px; border-top:1px solid var(--border);
    background:var(--panel);
    display:flex; align-items:center;
    padding:0 12px; gap:16px;
    font-family:var(--mono); font-size:9px;
    color:var(--textMut); flex-shrink:0;
  }
  .footer-item { display:flex; align-items:center; gap:5px; }
  .footer-dot { width:5px; height:5px; border-radius:50%; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-dot"></div>
    <div class="logo-text">CHONGDAM BRIDGE · DIGITAL TWIN</div>
  </div>
  <div class="header-right">
    <div class="status-badge"><div class="status-dot"></div>LIVE</div>
    <div class="time-display" id="time-display">--:--:--</div>
  </div>
</header>

<div class="main">
  <div id="canvas-wrap">
    <canvas id="three-canvas"></canvas>
    <div id="loading-overlay">
      <div>모델 로딩 중...</div>
      <div class="load-bar-wrap"><div id="loading-bar"></div></div>
      <div id="load-progress">0%</div>
    </div>
    <div class="legend">
      <div class="legend-title">상태 범례</div>
      <div class="legend-item"><div class="legend-dot" style="background:#30C080"></div>정상</div>
      <div class="legend-item"><div class="legend-dot" style="background:#F0A030"></div>주의</div>
      <div class="legend-item"><div class="legend-dot" style="background:#E84040"></div>경고</div>
      <div class="legend-item"><div class="legend-dot" style="background:#7B5EA7"></div>센서 마커</div>
    </div>
    <div id="graph-popup">
      <div class="popup-handle"></div>
      <div class="popup-header">
        <div class="popup-title" id="popup-title">--</div>
        <button class="popup-close" onclick="closePopup()">✕</button>
      </div>
      <div id="period-tabs" style="display:flex;gap:4px;margin-bottom:10px;">
        <button class="period-btn active" onclick="setPeriod('10m')">10분</button>
        <button class="period-btn" onclick="setPeriod('1h')">1시간</button>
        <button class="period-btn" onclick="setPeriod('1d')">일</button>
        <button class="period-btn" onclick="setPeriod('1mo')">월</button>
        <button class="period-btn" onclick="setPeriod('1y')">연</button>
      </div>
      <canvas id="graph-canvas" height="150"></canvas>
      <div class="popup-stats">
        <div class="stat-box"><div class="stat-label">최신값</div><div class="stat-val" id="stat-cur">--</div></div>
        <div class="stat-box"><div class="stat-label">최댓값</div><div class="stat-val" id="stat-max">--</div></div>
        <div class="stat-box"><div class="stat-label">평균값</div><div class="stat-val" id="stat-avg">--</div></div>
      </div>
    </div>
  </div>

  <div class="side-panel">
    <div class="panel-tabs">
      <div class="tab active" onclick="switchTab(this,'sensors')">SENSORS</div>
      <div class="tab" onclick="switchTab(this,'info')">INFO</div>
    </div>
    <div class="panel-content" id="tab-sensors"></div>
    <div class="panel-content" id="tab-info" style="display:none">
      <div class="sensor-section-title">프로젝트 정보</div>
      <div class="sensor-card" style="--card-color:#7B5EA7">
        <div class="sc-type" style="color:var(--text);line-height:1.8">
          청담대교 계측 센서 모니터링<br>
          <span style="color:var(--textMut)">데이터 주기:</span> 10분 간격<br>
          <span style="color:var(--textMut)">센서 종류:</span> 5종 14채널<br>
          <span style="color:var(--accent)">Revit IFC → GLB 변환</span>
        </div>
      </div>
    </div>
  </div>
</div>

<footer>
  <div class="footer-item"><div class="footer-dot" style="background:var(--safe)"></div>정상 <span id="cnt-safe">0</span></div>
  <div class="footer-item"><div class="footer-dot" style="background:var(--warn)"></div>주의 <span id="cnt-warn">0</span></div>
  <div class="footer-item"><div class="footer-dot" style="background:var(--danger)"></div>경고 <span id="cnt-danger">0</span></div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
<script>

const GLB_URL = './output/chongdam_bridge_compressed.glb?v=1';

// 상태평가 등급별 색상
const GRADE_COLORS = {
  'a': 0x2196F3,  // 파란색
  'b': 0x4CAF50,  // 초록색
  'c': 0xFFEB3B,  // 노란색
  'd': 0xFF9800,  // 주황색
  'e': 0xF44336,  // 빨간색
};

let memberGrades = {};
async function loadMemberGrades() {
  try {
    const res = await fetch('./output/member_grades.json');
    memberGrades = await res.json();
    console.log(`[OK] member_grades.json 로드 완료: ${Object.keys(memberGrades).length}개 부재`);
  } catch(e) {
    console.warn('[WARN] member_grades.json 로드 실패', e);
  }
}
loadMemberGrades();

// ── 센서 정의 ─────────────────────────────────────────────────────────────
const SENSORS = [
  { id:'EM_P39P40_01',  type:'신축변위계', unit:'mm',  color:'#FF8250', pos:[8,    9,  -21.5], axis:'x',  range:[-5,5],    noLimit:true },
  { id:'EM_P42P43_01',  type:'신축변위계', unit:'mm',  color:'#FF8250', pos:[-21.5,9,   59.8], axis:'x',  range:[-5,5],    noLimit:true },
  { id:'EM_P37_01',     type:'신축변위계', unit:'mm',  color:'#FF8250', pos:[33.5, 9,  -91],   axis:'x',  range:[-5,5],    noLimit:true },
  { id:'EM_P45_01',     type:'신축변위계', unit:'mm',  color:'#FF8250', pos:[-47.2,9,   130],  axis:'x',  range:[-5,5],    noLimit:true },
  { id:'T_P40_01',      type:'경사계',    unit:'°',   color:'#50DCA0', pos:[2.5,  5,  -15.7], axis:'rz', range:[-1.5,1.5], noLimit:true },
  { id:'T_P40_02',      type:'경사계',    unit:'°',   color:'#50DCA0', pos:[-0.5, 5,  -8],    axis:'rz', range:[-1.5,1.5], noLimit:true },
  { id:'T_P42_01',      type:'경사계',    unit:'°',   color:'#50DCA0', pos:[-8.5, 5,   14.5], axis:'rz', range:[-1.5,1.5], noLimit:true },
  { id:'T_P42_02',      type:'경사계',    unit:'°',   color:'#50DCA0', pos:[-11,  5,   22.2], axis:'rz', range:[-1.5,1.5], noLimit:true },
  { id:'Temp_P39P40_01',type:'온도계',    unit:'℃',   color:'#FFC83C', pos:[3,    6,  -17.5], axis:'t',  range:[-10,50],   noLimit:true },
  { id:'WG_WD',         type:'풍향',      unit:'°',   color:'#50AAFF', pos:[4.1,  9,  -10.8], axis:'w',  range:[0,360], noLimit:true },
  { id:'WG_WS_A',       type:'풍속(평균)',unit:'m/s', color:'#50AAFF', pos:[5,    9,  -13.1], axis:'w',  range:[0,30],  noLimit:true },
  { id:'WG_WS_M',       type:'풍속(최대)',unit:'m/s', color:'#50AAFF', pos:[3.2,  9,  -8.5],  axis:'w',  range:[0,40],  noLimit:true },
  { id:'AC_P36P37_Z_01',type:'가속도계',  unit:'gal', color:'#C850FF', pos:[35.5, 9,  -97],   axis:'z',  range:[0,200], noLimit:true },
  { id:'AC_P37P38_Z_01',type:'가속도계',  unit:'gal', color:'#C850FF', pos:[30,   9,  -82],   axis:'z',  range:[0,200], noLimit:true },
];

// ── CSV 데이터 ────────────────────────────────────────────────────────────
let csvData = null;
let currentPeriod = '1d';

async function loadCsvData() {
  try {
    const res = await fetch('./sensor_data.json');
    csvData = await res.json();
    renderPanel();
  } catch(e) {
    console.warn('[WARN] sensor_data.json 로드 실패', e);
  }
}
loadCsvData();

function getSensorSeries(id, period) {
  if (csvData && csvData[period] && csvData[period][id]) return csvData[period][id];
  const s = SENSORS.find(x => x.id === id);
  const vals = genData(s);
  const now = Date.now();
  const step = {' 10m':600000,'1h':3600000,'1d':86400000,'1mo':2592000000,'1y':31536000000}[period] || 86400000;
  return { ts: vals.map((_,i) => now - (vals.length-1-i)*step), val: vals };
}

function currentVal(id) {
  const s = getSensorSeries(id, '1d');
  return s.val.length ? s.val[s.val.length-1] : 0;
}

function getStatus(sensor) {
  if (sensor.noLimit) return 'safe';
  const v = currentVal(sensor.id), [lo,hi] = sensor.range;
  const warn20 = (hi-lo)*0.15;
  if (Math.abs(v-((lo+hi)/2)) > (hi-lo)/2 - warn20*0.5) return 'danger';
  if (Math.abs(v-((lo+hi)/2)) > (hi-lo)/2 - warn20)     return 'warn';
  return 'safe';
}

function genData(sensor) {
  const [lo,hi] = sensor.range;
  const mid = (lo+hi)/2, span=(hi-lo)*0.35;
  return Array.from({length:48}, (_,i) => mid + (Math.random()-0.5)*span + Math.sin(i*0.3)*span*0.3);
}

// ── Three.js 초기화 ───────────────────────────────────────────────────────
const canvas = document.getElementById('three-canvas');
const wrap   = document.getElementById('canvas-wrap');

// 레이아웃 계산 (JS로 강제 설정)
function setLayout() {
  const hh = document.querySelector('header').offsetHeight || 44;
  const fh = document.querySelector('footer').offsetHeight || 28;
  const avail = window.innerHeight - hh - fh;
  const cH = Math.floor(avail * 0.55);
  const pH = avail - cH;
  wrap.style.width  = window.innerWidth + 'px';
  wrap.style.height = cH + 'px';
  const sp = document.querySelector('.side-panel');
  if (sp) { sp.style.width = window.innerWidth + 'px'; sp.style.height = pH + 'px'; }
}
setLayout();

const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
const renderer = new THREE.WebGLRenderer({
  canvas,
  antialias: !isIOS,
  powerPreference: 'high-performance',
  alpha: false,
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 3));
renderer.setClearColor(0x0D1420, 1);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 100000);

// 조명
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(100, 200, 100);
scene.add(dirLight);
scene.add(new THREE.DirectionalLight(0x4488aa, 1.0).position.set(-100,50,-100));

// ── GLB 로드 ──────────────────────────────────────────────────────────────
const bridgeGroup = new THREE.Group();
scene.add(bridgeGroup);
let modelLoaded = false;

const loader = new THREE.GLTFLoader();
const dracoLoader = new THREE.DRACOLoader();
dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/draco/');
loader.setDRACOLoader(dracoLoader);

loader.load(GLB_URL,
  function(gltf) {
    const model = gltf.scene;
    model.traverse(child => {
      if (!child.isMesh) return;
      child.castShadow = true;
      child.receiveShadow = true;

      // 등급 색상 적용 (mesh 이름 = GlobalId)
      const grade = memberGrades[child.name];
      if (grade && GRADE_COLORS[grade]) {
        child.material = new THREE.MeshStandardMaterial({
          color: GRADE_COLORS[grade],
          emissive: GRADE_COLORS[grade],
          emissiveIntensity: 0.4,
          roughness: 0.6,
          metalness: 0.1,
        });
      } else {
        child.material = new THREE.MeshStandardMaterial({
          color: 0x888888,
          roughness: 0.7,
          metalness: 0.0,
        });
      }
    });

    const box    = new THREE.Box3().setFromObject(model);
    const size   = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    model.position.sub(center);
    bridgeGroup.add(model);

    const maxDim = Math.max(size.x, size.y, size.z);
    radius = maxDim * 1.2;
    camera.far  = maxDim * 200;
    camera.near = maxDim * 0.0001;
    camera.fov  = 60;

    // 카메라 초기 위치 — 교량 중심(0,0,0) 기준 회전
    theta = Math.PI / 2;
    phi   = Math.PI / 8;

    // setViewOffset으로 화면상 위치 조정 (회전 기준은 0,0,0 그대로)
    // offsetX 양수 → 모델 왼쪽, offsetY 양수 → 모델 위쪽
    const W = wrap.clientWidth, H = wrap.clientHeight;
    camera.setViewOffset(W, H, W * 0.25, H * 0.3, W, H);
    camera.updateProjectionMatrix();

    updateSensorScale(size);
    document.getElementById('loading-overlay').style.display = 'none';
    modelLoaded = true;
    console.log(`[OK] 모델 로드 완료 size: ${size.x.toFixed(0)}×${size.y.toFixed(0)}×${size.z.toFixed(0)}`);
  },
  function(xhr) {
    if (xhr.lengthComputable) {
      const pct = Math.round(xhr.loaded / xhr.total * 100);
      document.getElementById('loading-bar').style.width = pct + '%';
      document.getElementById('load-progress').textContent = `${pct}%`;
    }
  },
  function(error) {
    document.getElementById('loading-overlay').innerHTML =
      `<div style="color:#E84040">모델 로드 실패</div><div style="color:#5A7A99;font-size:10px;margin-top:6px">${error.message||String(error)}</div>`;
  }
);

// ── 센서 마커 ─────────────────────────────────────────────────────────────
const markerMeshes = {};
const markerGroup  = new THREE.Group();
scene.add(markerGroup);

const STATUS_COLORS = { safe: 0x30C080, warn: 0xF0A030, danger: 0xE84040 };
const STATUS_HEX    = { safe: '#30C080', warn: '#F0A030', danger: '#E84040' };

function makeLabelSprite(text) {
  const c = document.createElement('canvas');
  c.width = 512; c.height = 128;
  const ctx = c.getContext('2d');
  ctx.clearRect(0, 0, 512, 128);
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 36px IBM Plex Mono, monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 256, 64);
  const tex = new THREE.CanvasTexture(c);
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(8, 2, 1);
  sprite.userData.isLabel = true;
  return sprite;
}

SENSORS.forEach(s => {
  const status = getStatus(s);
  const col = STATUS_COLORS[status];
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.8, 12, 12),
    new THREE.MeshStandardMaterial({ color: col, emissive: col, emissiveIntensity: 0.7, metalness: 0.1, roughness: 0.3 })
  );
  mesh.position.set(...s.pos);
  mesh.userData.sensorId = s.id;
  markerGroup.add(mesh);
  markerMeshes[s.id] = mesh;

  const ring = new THREE.Mesh(
    new THREE.RingGeometry(1.0, 1.3, 16),
    new THREE.MeshBasicMaterial({ color: col, side: THREE.DoubleSide, transparent: true, opacity: 0.5 })
  );
  ring.rotation.x = -Math.PI / 2;
  ring.userData.isRing = true;
  mesh.add(ring);

  const sprite = makeLabelSprite(s.id);
  sprite.position.set(0, 2.5, 0);
  mesh.add(sprite);
});

function updateSensorScale(modelSize) {
  const markerSize = Math.max(modelSize.x, modelSize.z) * 0.015 * 0.25;
  markerGroup.scale.setScalar(markerSize);
}

// ── 카메라 컨트롤 (터치 전용) ────────────────────────────────────────────
let theta = Math.PI / 2, phi = Math.PI / 8, radius = 1200;

let touchPrev = null, pinchPrevDist = null;
let touchStartPos = null, touchMoved = false;

function getTouchDist(t) {
  const dx = t[0].clientX - t[1].clientX, dy = t[0].clientY - t[1].clientY;
  return Math.sqrt(dx*dx + dy*dy);
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches;
  touchMoved = false;
  if (t.length === 1) {
    touchPrev = { x:t[0].clientX, y:t[0].clientY };
    touchStartPos = { x:t[0].clientX, y:t[0].clientY };
    pinchPrevDist = null;
  } else if (t.length === 2) {
    pinchPrevDist = getTouchDist(t);
    touchPrev = null;
  }
}, { passive:false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches;
  touchMoved = true;
  if (t.length === 1 && touchPrev) {
    theta -= (t[0].clientX - touchPrev.x) * 0.005;
    phi = Math.max(0.05, Math.min(Math.PI/2.1, phi + (t[0].clientY - touchPrev.y) * 0.005));
    touchPrev = { x:t[0].clientX, y:t[0].clientY };
  } else if (t.length === 2 && pinchPrevDist !== null) {
    const dist = getTouchDist(t);
    radius = Math.max(10, Math.min(10000, radius * (pinchPrevDist / dist)));
    pinchPrevDist = dist;
  }
}, { passive:false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (!touchMoved && e.changedTouches.length === 1 && touchStartPos) {
    const dx = Math.abs(e.changedTouches[0].clientX - touchStartPos.x);
    const dy = Math.abs(e.changedTouches[0].clientY - touchStartPos.y);
    if (dx < 8 && dy < 8) {
      const rect  = canvas.getBoundingClientRect();
      const mouse = new THREE.Vector2(
        ((e.changedTouches[0].clientX - rect.left) / rect.width) * 2 - 1,
        -((e.changedTouches[0].clientY - rect.top) / rect.height) * 2 + 1
      );
      const ray = new THREE.Raycaster();
      ray.setFromCamera(mouse, camera);
      const hits = ray.intersectObjects(Object.values(markerMeshes));
      if (hits.length) openPopup(hits[0].object.userData.sensorId);
      else closePopup();
    }
  }
  if (e.touches.length === 0) { touchPrev = null; pinchPrevDist = null; touchStartPos = null; }
  else if (e.touches.length === 1) { touchPrev = { x:e.touches[0].clientX, y:e.touches[0].clientY }; pinchPrevDist = null; }
}, { passive:false });

// ── 팝업 ──────────────────────────────────────────────────────────────────
let popupSensorId = null;

function setPeriod(period) {
  currentPeriod = period;
  document.querySelectorAll('.period-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === {'10m':'10분','1h':'1시간','1d':'일','1mo':'월','1y':'연'}[period]);
  });
  if (popupSensorId) drawGraphPopup(popupSensorId);
}

function openPopup(id) {
  popupSensorId = id;
  const sensor = SENSORS.find(s => s.id === id);
  document.getElementById('popup-title').textContent = id + ' — ' + sensor.type;
  document.getElementById('graph-popup').classList.add('show');
  drawGraphPopup(id);
  document.querySelectorAll('.sensor-card').forEach(c => c.classList.remove('selected'));
  const card = document.querySelector(`[data-sensor-id="${id}"]`);
  if (card) { card.classList.add('selected'); card.scrollIntoView({behavior:'smooth',block:'nearest'}); }
}

function closePopup() {
  document.getElementById('graph-popup').classList.remove('show');
  document.querySelectorAll('.sensor-card').forEach(c => c.classList.remove('selected'));
  popupSensorId = null;
}

function drawGraphPopup(id) {
  const sensor = SENSORS.find(s => s.id === id);
  const series = getSensorSeries(id, currentPeriod);
  const data = series.val, ts = series.ts;
  if (!data.length) return;
  const cur = data[data.length-1], mx = Math.max(...data), avg = data.reduce((a,b)=>a+b,0)/data.length;
  document.getElementById('stat-cur').textContent = cur.toFixed(2) + ' ' + sensor.unit;
  document.getElementById('stat-max').textContent = mx.toFixed(2)  + ' ' + sensor.unit;
  document.getElementById('stat-avg').textContent = avg.toFixed(2) + ' ' + sensor.unit;
  const gc = document.getElementById('graph-canvas');
  const ctx = gc.getContext('2d');
  gc.width = gc.offsetWidth || 360; gc.height = 150;
  const W = gc.width, H = gc.height, pad = 36;
  ctx.clearRect(0,0,W,H);
  const mn = Math.min(...data), rng = mx-mn||1;
  const toX = i => pad + (W-pad*2)*i/(data.length-1);
  const toY = v => H-pad-(H-pad*2)*(v-mn)/rng;
  ctx.strokeStyle='#1A2640'; ctx.lineWidth=0.5;
  for(let i=0;i<5;i++){const y=pad+(H-pad*2)*i/4;ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(W-pad,y);ctx.stroke();ctx.fillStyle='#5A7A99';ctx.font='9px IBM Plex Mono';ctx.fillText((mn+rng*(1-i/4)).toFixed(1),2,y+3);}
  const grad=ctx.createLinearGradient(0,0,0,H);grad.addColorStop(0,sensor.color+'50');grad.addColorStop(1,sensor.color+'05');
  ctx.beginPath();ctx.moveTo(toX(0),toY(data[0]));data.forEach((_,i)=>{if(i>0)ctx.lineTo(toX(i),toY(data[i]));});ctx.lineTo(toX(data.length-1),H-pad);ctx.lineTo(toX(0),H-pad);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
  ctx.beginPath();ctx.moveTo(toX(0),toY(data[0]));data.forEach((_,i)=>{if(i>0)ctx.lineTo(toX(i),toY(data[i]));});ctx.strokeStyle=sensor.color;ctx.lineWidth=1.5;ctx.stroke();
  ctx.beginPath();ctx.arc(toX(data.length-1),toY(data[data.length-1]),4,0,Math.PI*2);ctx.fillStyle=sensor.color;ctx.fill();
}

// ── 센서 패널 ─────────────────────────────────────────────────────────────
const typeGroups = {
  '신축변위계': SENSORS.filter(s=>s.type==='신축변위계'),
  '경사계':     SENSORS.filter(s=>s.type==='경사계'),
  '온도계':     SENSORS.filter(s=>s.type==='온도계'),
  '풍향풍속':   SENSORS.filter(s=>s.id.startsWith('WG_')),
  '가속도계':   SENSORS.filter(s=>s.type==='가속도계'),
};

function renderPanel() {
  const cont = document.getElementById('tab-sensors');
  cont.innerHTML = '';
  let safe=0,warn=0,danger=0;
  Object.entries(typeGroups).forEach(([name,sensors])=>{
    const title=document.createElement('div');title.className='sensor-section-title';title.textContent=name;cont.appendChild(title);
    sensors.forEach(s=>{
      const val=currentVal(s.id),status=getStatus(s);
      if(status==='safe')safe++;else if(status==='warn')warn++;else danger++;
      const card=document.createElement('div');card.className='sensor-card';card.style.setProperty('--card-color',s.color);card.dataset.sensorId=s.id;
      const statusLabel=status==='safe'?'정상':status==='warn'?'주의':'경고';
      card.innerHTML=`<div class="sc-top"><span class="sc-id">${s.id}</span><span class="sc-status ${status}">${statusLabel}</span></div><div><span class="sc-val">${val.toFixed(2)}</span><span class="sc-unit">${s.unit}</span></div><div class="sc-type">${s.type}</div>`;
      card.onclick=()=>openPopup(s.id);cont.appendChild(card);
    });
  });
  document.getElementById('cnt-safe').textContent=safe;
  document.getElementById('cnt-warn').textContent=warn;
  document.getElementById('cnt-danger').textContent=danger;
}

function switchTab(el,tab) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');
  document.getElementById('tab-sensors').style.display=tab==='sensors'?'block':'none';
  document.getElementById('tab-info').style.display=tab==='info'?'block':'none';
}

// ── 시간 ──────────────────────────────────────────────────────────────────
setInterval(()=>{document.getElementById('time-display').textContent=new Date().toLocaleTimeString('ko-KR',{hour12:false});},1000);
document.getElementById('time-display').textContent=new Date().toLocaleTimeString('ko-KR',{hour12:false});

// ── 애니메이션 루프 ───────────────────────────────────────────────────────
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.016;
  if (!modelLoaded) { renderer.render(scene, camera); return; }

  // 카메라 위치 — 항상 원점(0,0,0) 기준 공전
  camera.position.x = Math.sin(theta) * Math.cos(phi) * radius;
  camera.position.y = Math.sin(phi) * radius;
  camera.position.z = Math.cos(theta) * Math.cos(phi) * radius;
  camera.lookAt(0, 0, 0);

  // 마커 펄스
  markerGroup.children.forEach(m => {
    if (m.userData.isRing) {
      m.scale.setScalar(1 + Math.sin(t*2 + m.position.x*0.1)*0.2);
      m.material.opacity = 0.2 + Math.sin(t*2 + m.position.x*0.1)*0.15;
    } else if (m.userData.sensorId) {
      const sensor = SENSORS.find(s=>s.id===m.userData.sensorId);
      if (sensor) {
        const status = getStatus(sensor);
        const col = STATUS_COLORS[status];
        m.material.color.setHex(col);
        m.material.emissive.setHex(col);
        m.material.emissiveIntensity = 0.5 + Math.sin(t*3)*0.3;
        m.children.forEach(child => {
          if (child.userData.isRing) child.material.color.setHex(col);
          if (child.userData.isLabel) {
            // 모바일 radius 범위에 맞게 조절 (radius ~900~3000)
            const scale = Math.max(0.3, Math.min(1.0, 600 / radius));
            child.scale.set(8 * scale, 2 * scale, 1);
            child.material.opacity = radius > 500 ? Math.max(0, 1 - (radius - 500) / 300) : 1;
          }
        });
      }
    }
  });

  // canvas 크기 동기화
  const W = wrap.clientWidth || window.innerWidth;
  const H = wrap.clientHeight || Math.floor(window.innerHeight*0.55);
  if (renderer.domElement.width !== W || renderer.domElement.height !== H) {
    renderer.setSize(W, H, false);
    camera.aspect = W / H;
    camera.updateProjectionMatrix();
  }

  renderer.render(scene, camera);
}

// ── 초기화 ────────────────────────────────────────────────────────────────
function initRendererSize() {
  setLayout();
  const W = wrap.clientWidth  || window.innerWidth;
  const H = wrap.clientHeight || Math.floor(window.innerHeight*0.55);
  renderer.setSize(W, H, false);
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
}
initRendererSize();
renderPanel();
animate();

window.addEventListener('resize', ()=>{ initRendererSize(); });
window.addEventListener('orientationchange', ()=>setTimeout(initRendererSize, 300));
window.addEventListener('load', ()=>setTimeout(initRendererSize, 300));

if ('serviceWorker' in navigator) {
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./service-worker.js').catch(()=>{});
  });
}

// 콘솔 헬퍼
window.moveMarker = (id,x,y,z)=>{ const m=markerMeshes[id]; if(m){m.position.set(x,y,z);console.log(`${id} → (${x},${y},${z})`);} };
window.listMarkers = ()=>SENSORS.forEach(s=>{ const m=markerMeshes[s.id]; if(m)console.log(`${s.id}: ${m.position.x.toFixed(1)}, ${m.position.y.toFixed(1)}, ${m.position.z.toFixed(1)}`); });

</script>
